name: run-tests

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - ".github/workflows/run-tests.yml"
      - "**kind**"
      - "**k3d**"

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  github-context:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "${GITHUB_CONTEXT}"
  docker-mise-linux:
    if: ${{ (!startsWith(github.ref_name, 'renovate/') && !startsWith(github.ref_name, 'release-please--')) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ubuntu-24.04, ubuntu-24.04-arm]
        os: [ubuntu-24.04]
        type: [kind, k3d]
    timeout-minutes: 10
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🚀 Run mise
        env:
          TYPE: ${{ matrix.type }}
        run: |
          docker run --rm -i --env GITHUB_TOKEN --env CLICOLOR_FORCE=1 --env TYPE \
            -v "$PWD:/mnt" -v "/var/run/docker.sock:/var/run/docker.sock" \
            --workdir /mnt \
            bash bash -c 'set -euo pipefail && \
              apk add docker && \
              wget -q https://mise.run -O - | sh && \
              eval "$(~/.local/bin/mise activate bash)" && \
              mise run "create-${TYPE}-all" && \
              mise run "delete-${TYPE}-all" && \
              echo "*** Completed ..." \
            '

  mise-linux:
    if: ${{ (!startsWith(github.ref_name, 'renovate/') && !startsWith(github.ref_name, 'release-please--')) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ubuntu-24.04, ubuntu-24.04-arm]
        os: [ubuntu-24.04]
        type: [kind, k3d]
    timeout-minutes: 10
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 📦 Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: 🚀 Run mise
        env:
          TYPE: ${{ matrix.type }}
        run: |
          mise run "create-${TYPE}-all"
          mise run "delete-${TYPE}-all"
